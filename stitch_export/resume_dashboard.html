<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Dashboard | Unimad Stitch Export</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f6fe',
                            100: '#dde9fc',
                            200: '#c2d9fa',
                            300: '#9bc0f6',
                            400: '#6ea0f0',
                            500: '#346de0', // Primary
                            600: '#2553d0',
                            700: '#1e42a8',
                            800: '#1b3888',
                            900: '#1b316b',
                        }
                    },
                    fontFamily: {
                        sans: ['Onest', 'sans-serif'],
                    }
                },
            },
        }
    </script>
    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Onest:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Onest', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen">

    <div class="flex-1 bg-slate-50 h-full overflow-y-auto p-8 relative min-h-screen">
        <div class="max-w-6xl mx-auto">
            <div class="mb-8">
                <h1 class="text-2xl font-normal text-slate-900">Resumes</h1>
                <p class="text-slate-500 mt-1">Manage and tailor your resumes for different opportunities.</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <!-- Create New Card -->
                <button
                    class="group flex flex-col items-center justify-center h-64 border-2 border-dashed border-slate-300 rounded-xl hover:border-brand-400 hover:bg-brand-50/50 transition-all cursor-pointer bg-white">
                    <div
                        class="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center text-slate-400 group-hover:bg-brand-100 group-hover:text-brand-600 mb-3 transition-colors">
                        <i data-lucide="plus" class="w-6 h-6"></i>
                    </div>
                    <span class="font-medium text-slate-600 group-hover:text-brand-600">New Resume</span>
                </button>

                <!-- Resume Card 1 -->
                <div
                    class="bg-white rounded-xl shadow-sm hover:shadow-md border border-slate-200 cursor-pointer transition-all hover:-translate-y-1 group relative">
                    <!-- Preview Thumbnail -->
                    <div
                        class="h-40 bg-slate-100 relative overflow-hidden flex items-center justify-center rounded-t-xl">
                        <div
                            class="w-32 h-44 bg-white shadow-sm border border-slate-200 transform scale-75 origin-top mt-8 px-2 py-2 text-[4px] text-slate-300 overflow-hidden select-none">
                            <div class="w-full h-2 bg-slate-300 mb-2"></div>
                            <div class="space-y-1">
                                <div class="w-full h-1 bg-slate-200"></div>
                                <div class="w-2/3 h-1 bg-slate-200"></div>
                            </div>
                        </div>
                        <div class="absolute inset-0 bg-black/0 group-hover:bg-black/5 transition-colors"></div>
                    </div>

                    <div class="p-4 rounded-b-xl relative">
                        <div class="flex justify-between items-start">
                            <div class="flex-1 min-w-0 pr-2">
                                <h3 class="font-medium text-slate-900 mb-1 truncate">Product Design Resume</h3>
                                <div class="flex items-center gap-1.5 text-xs text-slate-500">
                                    <i data-lucide="clock" class="w-3 h-3"></i>
                                    <span>Edited 10/15/2023</span>
                                </div>
                            </div>
                            <button
                                class="p-1 rounded hover:bg-slate-100 text-slate-400 hover:text-slate-600 transition-colors">
                                <i data-lucide="more-vertical" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Resume Card 2 -->
                <div
                    class="bg-white rounded-xl shadow-sm hover:shadow-md border border-slate-200 cursor-pointer transition-all hover:-translate-y-1 group relative">
                    <div
                        class="h-40 bg-slate-100 relative overflow-hidden flex items-center justify-center rounded-t-xl">
                        <div
                            class="w-32 h-44 bg-white shadow-sm border border-slate-200 transform scale-75 origin-top mt-8 px-2 py-2 text-[4px] text-slate-300 overflow-hidden select-none">
                            <div class="w-full h-2 bg-slate-300 mb-2"></div>
                            <div class="space-y-1">
                                <div class="w-full h-1 bg-slate-200"></div>
                                <div class="w-full h-1 bg-slate-200"></div>
                            </div>
                        </div>
                        <div class="absolute inset-0 bg-black/0 group-hover:bg-black/5 transition-colors"></div>
                    </div>

                    <div class="p-4 rounded-b-xl relative">
                        <div class="flex justify-between items-start">
                            <div class="flex-1 min-w-0 pr-2">
                                <h3 class="font-medium text-slate-900 mb-1 truncate">Frontend Developer Variant</h3>
                                <div class="flex items-center gap-1.5 text-xs text-slate-500">
                                    <i data-lucide="clock" class="w-3 h-3"></i>
                                    <span>Edited 09/20/2023</span>
                                </div>
                            </div>
                            <button
                                class="p-1 rounded hover:bg-slate-100 text-slate-400 hover:text-slate-600 transition-colors">
                                <i data-lucide="more-vertical" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>

</html>
